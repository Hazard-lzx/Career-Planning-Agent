server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: career-agent-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/career_agent?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:your_db_password}

  neo4j:
    uri: bolt://192.168.80.80:7474
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:your_neo4j_password}

  data:
    redis:
      host: 192.168.80.80
      port: 6379
      password: ${REDIS_PASSWORD:your_redis_password}
      database: 3
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

langchain4j:
  open-ai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY:your_api_key_here}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen3.7-plus
      temperature: 0.3
      timeout: 120s
      log-requests: true
      log-responses: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.career.agent.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

rocketmq:
  name-server: 192.168.80.80:9876
  producer:
    group: career-agent-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

knife4j:
  enable: true
  setting:
    language: zh-CN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.career.agent: debug
    org.springframework.data.neo4j: info
    dev.langchain4j: debug
